name: "CodeQL for GitHub Actions"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  actions: read
  contents: read
  security-events: write # 検知結果をPRにフィードバックするために必須

jobs:
  analyze-workflows:
    name: Analyze Actions Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        # 💡 ここが最大のポイント！「actions」を指定するとYAMLとシェルスクリプトを解析します
        languages: actions

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:actions"