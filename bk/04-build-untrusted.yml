name: 04 - Build (Untrusted)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        # pull_requestトリガーなので、フォークのコードは安全に（read-onlyで）チェックアウトされます

      - name: Run tests and generate status
        # 💡 リポジトリ内のスクリプトを実行して、結果を status.txt に書き出します
        run: bash ./generate_status.sh

      - name: Upload test result as artifact
        # 💡 テスト結果を「バトン」としてアップロードします
        uses: actions/upload-artifact@v4
        with:
          name: pr-status
          path: status.txt