# Vuln-13: Environment 保護ルール未使用
# 脆弱性: リリース/デプロイに environment を設定していないため、
#          workflow_dispatch を任意ブランチでトリガーされると secrets にアクセスされる。
#          nx の侵害で実際に悪用されたパターン。
# 検知想定: OpenSSF Scorecard, zizmor

name: "Vuln-13: No Environment Protection"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # environment 未設定: どのブランチからでも secrets にアクセス可能
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/deploy.sh
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
