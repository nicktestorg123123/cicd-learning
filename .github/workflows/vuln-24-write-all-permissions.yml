# Vuln-24: permissions: write-all の使用
# 脆弱性: write-all は全スコープに write を付与する最も危険な設定。
# 検知想定: zizmor (excessive-permissions), OpenSSF Scorecard (Token-Permissions)

name: "Vuln-24: Write-All Permissions"

on:
  push:
    branches: [main]
  pull_request:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test
