name: Step-Level Env Memory Dump

on:
  workflow_dispatch:

jobs:
  check-step-visibility:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Set Step-level ENV
        env:
          # 検証用: "HiddenSecret" -> base64 -> "SGlkZGVuU2VjcmV0" -> base64 -> "U0dsS1pHVnVVMlZqY21WMg=="
          STEP_VAL: "U0dsS1pHVnVVMlZqY21WMg=="
        run: |
          echo "Step 1 is running..."
          echo "STEP_VAL is set in this step's env."

      - name: Step 2 - Ordinary Printenv
        run: |
          echo "--- Step 2: Checking ordinary visibility ---"
          printenv | grep STEP_VAL || echo "STEP_VAL is not found in standard env (as expected)."

      - name: Step 3 - Memory Dump via B64 Script and Double Decode
        run: |
          # 1. ユーザー提供のPythonスクリプトをBase64化したものをデコードして作成
          echo "" | base64 -d > dump_mem.py

          echo "--- Step 3: Searching for STEP_VAL in Runner.Worker memory ---"
          
          # 2. メモリをダンプし、STEP_VAL= を探し、値を2回デコードする
          # grep -a はバイナリをテキストとして扱うフラグ
          RESULT=$(sudo python3 dump_mem.py | grep -a "STEP_VAL=" | head -n 1 | cut -d '=' -f2)
          
          if [ -z "$RESULT" ]; then
            echo "STEP_VAL not found in memory. It might have been garbage collected or not allocated in the same way."
          else
            echo "Extracted value (B64x2): $RESULT"
            
            echo -n "Decoded once: "
            echo "$RESULT" | base64 -d
            echo ""
            
            echo -n "Decoded twice (Final Secret): "
            echo "$RESULT" | base64 -d | base64 -d
            echo ""
          fi
