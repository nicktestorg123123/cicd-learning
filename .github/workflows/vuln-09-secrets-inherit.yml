# Vuln-09: secrets: inherit による全 secrets の暗黙的な受け渡し
# 脆弱性: 再利用可能なワークフローに secrets: inherit で全 secrets が渡される。
#          呼び出し先が侵害された場合、全 secrets が漏洩する。
# 検知想定: zizmor (secrets-inherit)

name: "Vuln-09: Secrets Inherit"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  call-build:
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit

  call-test:
    uses: ./.github/workflows/reusable-test.yml
    secrets: inherit

  call-external:
    uses: external-org/shared-workflows/.github/workflows/deploy.yml@main
    secrets: inherit

  call-deploy:
    needs: [call-build, call-test]
    uses: ./.github/workflows/reusable-deploy.yml
    secrets: inherit
