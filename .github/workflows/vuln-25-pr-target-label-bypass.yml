# Vuln-25: pull_request_target + ラベルチェックによる不十分なガード
# 脆弱性: ラベルの存在で checkout を制御しようとしているが、
#          PR にラベルが付与された後に悪意あるコミットを追加できるため不十分。
#          また、Script Injection も含んでいる。
# 検知想定: zizmor (dangerous-triggers, expression-injection), CodeQL

name: "Vuln-25: Insufficient Label Guard on PR Target"

on:
  pull_request_target:
    types: [labeled, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log PR info
        run: |
          echo "Testing PR: ${{ github.event.pull_request.title }}"
          echo "By: ${{ github.event.pull_request.head.ref }}"

      - run: npm install
      - run: npm test

      - name: Post result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: 'Tests completed for: ${{ github.event.pull_request.title }}'
            });
