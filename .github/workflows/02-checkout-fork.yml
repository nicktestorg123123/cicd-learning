name: 02 - Vulnerable Fork Checkout

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

# 1. ワークフロー全体の環境変数
# ⭕ 修正: コロンの後に必ずスペースを入れます
env:
  envtest: "envtest12234_1234"
  
jobs:
  build-untrusted-code:
    runs-on: ubuntu-latest
    
    # 2. ジョブレベルの環境変数（追加）
    env:
      jobenv: "jobenv_56789"
      
    steps:
      - name: env settings
        run: echo "Setting step env"
        env:
          stepenv: "stepenv111111"
          
      - name: Checkout PR Head (Vulnerable)
        uses: actions/checkout@v4
        with:
          # ⚠️ 意図的な脆弱性: フォークされた信頼できないコードをチェックアウトする
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run untrusted build script
        # ⚠️ 意図的な脆弱性: チェックアウトしたディレクトリ内のスクリプトを実行してしまう
        run: |
          echo "Running untrusted code..."
          npm install || echo "No package.json found, but this step is still conceptually vulnerable."
      - name: env settings
        run: printenv
  
  envcheck:
      runs-on: ubuntu-latest
      steps:
      - name: env settings
        run: printenv
