# Reusable workflow stub (vuln-09 から呼び出される)
name: "Reusable: Build"

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false
      DEPLOY_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
